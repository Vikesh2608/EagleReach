<script>

// ------------------------------
// Backend base
// ------------------------------
const API_BASE =
window.location.hostname === "vikesh2608.github.io"
? "https://eaglereach-1.onrender.com"
: "http://localhost:8000";


// ------------------------------
// Small helpers
// ------------------------------
const $ = (id) => document.getElementById(id);

const esc = (s) =>
String(s ?? '').replace(/[&<>"']/g, (m) =>
({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const delay = (ms) => new Promise(r => setTimeout(r, ms));


// ------------------------------
// Render Officials
// ------------------------------
function itemHTML(p) {

if (!p) return '';

const photo = p.photo
? `<img src="${esc(p.photo)}" alt="">`
: `<img src="https://via.placeholder.com/48" alt="">`;

const name = esc(p.name || 'Unknown');

const role = esc([
p.role,
p.party,
p.state && p.state.toUpperCase(),
p.district && `#${p.district}`
].filter(Boolean).join(' • '));

const website = p.website
? `<a href="${esc(p.website)}" target="_blank">official website</a>`
: '';

const phone = p.phone ? ` | ${esc(p.phone)}` : '';

const twitter = p.twitter
? ` <a href="https://twitter.com/${esc(p.twitter)}" target="_blank">@${esc(p.twitter)}</a>`
: '';

return `
<div class="official">
${photo}
<div class="meta">
<div class="name">${name}</div>
<div class="sub">${role}</div>
<div class="sub">${website}${phone}${twitter}</div>
</div>
</div>
`;
}


function renderOfficials(data) {

const off = data.officials || {};

const senators = Array.isArray(off.senators)
? off.senators
: [];

const reps = off.representative
? [off.representative]
: [];

$('senators').innerHTML =
senators.length
? senators.map(itemHTML).join('')
: '<div class="empty">No data.</div>';

$('representatives').innerHTML =
reps.length
? reps.map(itemHTML).join('')
: '<div class="empty">No data.</div>';

$('mayor').innerHTML =
off.mayor
? itemHTML(off.mayor)
: '<div class="empty">No mayor data.</div>';

}


function renderLocation(loc) {

$('locBadge').textContent =
(loc?.city && loc?.state)
? `${loc.city}, ${loc.state}`
: (loc?.zip ? `ZIP ${loc.zip}` : '');

}


// ------------------------------
// Banner Messages
// ------------------------------
function showBanner(msg = '', type = 'error') {

const el = $('apiWarning');

if (!msg) {
el.style.display = 'none';
return;
}

el.textContent = msg;
el.className = `banner ${type}`;
el.style.display = 'block';

}


function setLoading(v) {

$('searchBtn').disabled = v;
$('locBtn').disabled = v;
$('zip').disabled = v;

}


// ------------------------------
// API helper
// ------------------------------
async function apiGet(path) {

const r = await fetch(`${API_BASE}${path}`);

if (!r.ok) {
const text = await r.text().catch(()=> '');
throw new Error(`HTTP ${r.status} ${r.statusText} — ${text}`.slice(0,300));
}

return r.json();

}


// ------------------------------------------------
// ZIP lookup
// ------------------------------------------------
async function lookupOfficialsByZip(zip) {

setLoading(true);

showBanner(`Looking up officials for ZIP ${zip}...`, 'info');

try {

const data = await apiGet(`/officials?zip=${encodeURIComponent(zip)}`);

renderLocation(data.location);

renderOfficials(data);

showBanner('');

} catch(e) {

console.error(e);

showBanner(`Couldn't load officials. ${e.message}`);

}

setLoading(false);

}


// ------------------------------------------------
// GEO lookup (FIXED VERSION)
// ------------------------------------------------
async function lookupOfficialsByGeo(lat, lon) {

setLoading(true);

showBanner("Finding your location...", "info");

try {

const geo = await apiGet(`/revgeo?lat=${lat}&lon=${lon}`);

if (!geo.zip) {
throw new Error("ZIP not found for your location");
}

const data = await apiGet(`/officials?zip=${geo.zip}`);

renderLocation(data.location);

renderOfficials(data);

showBanner('');

} catch(e) {

console.error(e);

showBanner(`Location lookup failed: ${e.message}`);

}

setLoading(false);

}


// ------------------------------------------------
// Warm backend (Render free tier sleep fix)
// ------------------------------------------------
async function warmBackend() {

try {

showBanner("Waking the server (Render free tier)...","info");

await Promise.race([
apiGet('/health'),
(async ()=>{ await delay(8000); throw new Error("timeout") })()
]);

showBanner('');

} catch {}

}


// ------------------------------------------------
// UI wiring
// ------------------------------------------------
window.addEventListener('DOMContentLoaded', async () => {

warmBackend();

$('searchForm').addEventListener('submit', (ev)=>{

ev.preventDefault();

const zip = $('zip').value.trim();

if (/^\d{5}$/.test(zip))
lookupOfficialsByZip(zip);
else
showBanner("Please enter a valid 5-digit ZIP.");

});


$('locBtn').addEventListener('click', ()=>{

showBanner("Requesting browser location...","info");

setLoading(true);

if (!navigator.geolocation) {

showBanner("Geolocation not supported. Enter ZIP manually.");

setLoading(false);

return;

}

navigator.geolocation.getCurrentPosition(

async(pos)=>{

const {latitude, longitude} = pos.coords;

await lookupOfficialsByGeo(latitude, longitude);

},

(err)=>{

showBanner(`Location permission denied (${err.message})`);

setLoading(false);

},

{
enableHighAccuracy:false,
timeout:15000,
maximumAge:300000
}

);

});


// Auto search if ZIP already present
const initial = $('zip').value.trim();

if (/^\d{5}$/.test(initial))
lookupOfficialsByZip(initial);

});

</script>
