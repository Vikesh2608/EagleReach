<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EagleReach</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#0b0b1f;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
padding:40px;
}

input{
padding:10px;
font-size:16px;
width:200px;
}

button{
padding:10px 15px;
font-size:16px;
margin:5px;
cursor:pointer;
}

.section{
margin:30px auto;
max-width:700px;
}

.official{
display:flex;
align-items:center;
margin:10px 0;
background:#1c1c3a;
padding:10px;
border-radius:6px;
}

.official img{
width:48px;
height:48px;
border-radius:50%;
margin-right:10px;
}

.meta{
text-align:left;
}

.banner{
background:#cc0000;
padding:10px;
margin:10px auto;
max-width:600px;
display:none;
}

.empty{
opacity:0.6;
}

</style>
</head>

<body>

<header>
<h1>EagleReach</h1>
<p>Find your elected officials</p>
</header>


<div id="apiWarning" class="banner"></div>


<form id="searchForm">

<input id="zip" type="text" placeholder="Enter ZIP code">

<button id="searchBtn">Search</button>

<button type="button" id="locBtn">Use my location</button>

</form>


<div class="section">

<h3 id="locBadge"></h3>

</div>


<div class="section">

<h2>Senators</h2>
<div id="senators"></div>

</div>


<div class="section">

<h2>Representative</h2>
<div id="representatives"></div>

</div>


<div class="section">

<h2>Mayor</h2>
<div id="mayor"></div>

</div>


<script>

// ==============================
// Backend URL
// ==============================
const API_BASE = "https://eaglereach-1.onrender.com";


// ==============================
// Helpers
// ==============================
const $ = (id)=>document.getElementById(id);

function esc(s){
return String(s ?? '').replace(/[&<>"']/g,(m)=>(
{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]
));
}


// ==============================
// Render officials
// ==============================
function itemHTML(p){

if(!p) return "";

const photo=p.photo
? `<img src="${esc(p.photo)}">`
: `<img src="https://via.placeholder.com/48">`;

const name=esc(p.name||"Unknown");

const website=p.website
? `<a href="${esc(p.website)}" target="_blank">Website</a>`
: "";

return `
<div class="official">
${photo}
<div class="meta">
<div>${name}</div>
<div>${website}</div>
</div>
</div>
`;

}


function renderOfficials(data){

const off=data.officials||{};

const senators=off.senators||[];
const rep=off.representative?[off.representative]:[];

$("senators").innerHTML=
senators.length
? senators.map(itemHTML).join("")
: `<div class="empty">No data</div>`;

$("representatives").innerHTML=
rep.length
? rep.map(itemHTML).join("")
: `<div class="empty">No data</div>`;

$("mayor").innerHTML=
off.mayor
? itemHTML(off.mayor)
: `<div class="empty">No mayor data</div>`;

}


function renderLocation(loc){

$("locBadge").textContent=
(loc?.city && loc?.state)
? `${loc.city}, ${loc.state}`
: (loc?.zip?`ZIP ${loc.zip}`:"");

}


function showBanner(msg){

const el=$("apiWarning");

if(!msg){
el.style.display="none";
return;
}

el.textContent=msg;
el.style.display="block";

}


async function apiGet(path){

const r=await fetch(`${API_BASE}${path}`);

if(!r.ok){
throw new Error("API error");
}

return r.json();

}


// ==============================
// ZIP lookup
// ==============================
async function lookupOfficialsByZip(zip){

showBanner("Loading officials...");

try{

const data=await apiGet(`/officials?zip=${zip}`);

renderLocation(data.location);
renderOfficials(data);

showBanner("");

}catch(e){

showBanner("Could not load officials");

}

}


// ==============================
// GEO lookup
// ==============================
async function lookupOfficialsByGeo(lat,lon){

try{

const geo=await apiGet(`/revgeo?lat=${lat}&lon=${lon}`);

let zip=geo.zip;

if(!zip){

zip=$("zip").value;

if(!zip){
throw new Error("ZIP unavailable");
}

}

const data=await apiGet(`/officials?zip=${zip}`);

renderLocation(data.location);
renderOfficials(data);

}catch(e){

console.error(e);
showBanner("Location lookup failed");

}

}


// ==============================
// Events
// ==============================
window.addEventListener("DOMContentLoaded",()=>{


$("searchForm").addEventListener("submit",(e)=>{

e.preventDefault();

const zip=$("zip").value.trim();

if(/^\d{5}$/.test(zip)){
lookupOfficialsByZip(zip);
}else{
showBanner("Enter valid ZIP code");
}

});


$("locBtn").addEventListener("click",()=>{

if(!navigator.geolocation){
showBanner("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition(

(pos)=>{
lookupOfficialsByGeo(
pos.coords.latitude,
pos.coords.longitude
);
},

()=>{
showBanner("Location permission denied");
}

);

});


});

</script>

</body>
</html>
