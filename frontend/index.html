<script>

// ==============================
// Backend URL
// ==============================
const API_BASE = "https://eaglereach-1.onrender.com";


// ==============================
// Helpers
// ==============================
const $ = (id) => document.getElementById(id);

const esc = (s) =>
String(s ?? '').replace(/[&<>"']/g, (m) =>
({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));


// ==============================
// Render officials
// ==============================
function itemHTML(p) {

if (!p) return '';

const photo = p.photo
? `<img src="${esc(p.photo)}" alt="">`
: `<img src="https://via.placeholder.com/48" alt="">`;

const name = esc(p.name || "Unknown");

const role = esc([
p.party
].filter(Boolean).join(" • "));

const website = p.website
? `<a href="${esc(p.website)}" target="_blank">Official website</a>`
: "";

const phone = p.phone
? ` | ${esc(p.phone)}`
: "";

return `
<div class="official">
${photo}
<div class="meta">
<div class="name">${name}</div>
<div class="sub">${role}</div>
<div class="sub">${website}${phone}</div>
</div>
</div>
`;

}


// ==============================
// Render officials list
// ==============================
function renderOfficials(data) {

const off = data.officials || {};

const senators = off.senators || [];
const rep = off.representative ? [off.representative] : [];

$("senators").innerHTML =
senators.length
? senators.map(itemHTML).join("")
: `<div class="empty">No data</div>`;

$("representatives").innerHTML =
rep.length
? rep.map(itemHTML).join("")
: `<div class="empty">No data</div>`;

}


// ==============================
// Render location
// ==============================
function renderLocation(loc) {

$("locBadge").textContent =
(loc?.city && loc?.state)
? `${loc.city}, ${loc.state}`
: (loc?.zip ? `ZIP ${loc.zip}` : "");

}


// ==============================
// Banner messages
// ==============================
function showBanner(msg="",type="error"){

const el = $("apiWarning");

if(!msg){
el.style.display="none";
return;
}

el.textContent=msg;
el.className=`banner ${type}`;
el.style.display="block";

}


// ==============================
// Loading state
// ==============================
function setLoading(v){

$("searchBtn").disabled=v;
$("locBtn").disabled=v;
$("zip").disabled=v;

}


// ==============================
// API call
// ==============================
async function apiGet(path){

const r = await fetch(`${API_BASE}${path}`);

if(!r.ok){
throw new Error(`Server error ${r.status}`);
}

return r.json();

}


// ==============================
// Lookup by ZIP
// ==============================
async function lookupOfficialsByZip(zip){

setLoading(true);

showBanner(`Looking up officials for ZIP ${zip}`,"info");

try{

const data = await apiGet(`/officials?zip=${zip}`);

renderLocation(data.location);
renderOfficials(data);

showBanner("");

}catch(e){

console.error(e);
showBanner("Could not load officials");

}

setLoading(false);

}


// ==============================
// Lookup by GEO (FINAL FIX)
// ==============================
async function lookupOfficialsByGeo(lat,lon){

setLoading(true);

try{

const geo = await apiGet(`/revgeo?lat=${lat}&lon=${lon}`);

renderLocation({
city: geo.city,
state: geo.state || geo.state_full,
zip: geo.zip
});

let zip = geo.zip;

// fallback if revgeo ZIP missing
if(!zip){
zip = $("zip").value.trim();
}

// safety fallback
if(!zip){
zip = "45220";
}

const data = await apiGet(`/officials?zip=${zip}`);

renderOfficials(data);

showBanner("");

}catch(e){

console.error(e);
showBanner("Location lookup failed");

}

setLoading(false);

}


// ==============================
// Warm backend (Render free tier)
// ==============================
async function warmBackend(){

try{
await apiGet("/health");
}catch{}

}


// ==============================
// UI Events
// ==============================
window.addEventListener("DOMContentLoaded",()=>{

warmBackend();


// Search by ZIP
$("searchForm").addEventListener("submit",(e)=>{

e.preventDefault();

const zip=$("zip").value.trim();

if(/^\d{5}$/.test(zip)){
lookupOfficialsByZip(zip);
}else{
showBanner("Enter valid ZIP code");
}

});


// Use my location
$("locBtn").addEventListener("click",()=>{

showBanner("Getting your location...","info");

if(!navigator.geolocation){

showBanner("Geolocation not supported");

return;

}

navigator.geolocation.getCurrentPosition(

(pos)=>{

lookupOfficialsByGeo(
pos.coords.latitude,
pos.coords.longitude
);

},

()=>{

showBanner("Location permission denied");

}

);

});

});

</script>
